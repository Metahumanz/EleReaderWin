name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Electron app
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EleWinReader
          path: |
            release/*.exe
            release/*.msi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: EleWinReader ${{ github.ref_name }}
          body: |
            ## EleWinReader ${{ github.ref_name }}

            ### 下载链接
            - **Windows**: 安装包 (exe/msi)

            ### 更新内容
            请查看 [Commit 历史](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) 获取详细更新内容。
          draft: false
          prerelease: false
          make_latest: true
          files: |
            release/*.exe
            release/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

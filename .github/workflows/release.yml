name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: EleWinReader-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.msi

      - name: Upload artifacts (macOS)
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: EleWinReader-${{ matrix.platform }}
          path: |
            release/*.dmg

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: EleWinReader-${{ matrix.platform }}
          path: |
            release/*.AppImage
            release/*.deb

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: EleWinReader ${{ github.ref_name }}
          body: |
            ## EleWinReader ${{ github.ref_name }}

            ### 下载链接
            - **Windows**: EleWinReader-${{ github.ref_name }}.exe / .msi
            - **macOS**: EleWinReader-${{ github.ref_name }}.dmg
            - **Linux**: EleWinReader-${{ github.ref_name }}.AppImage / .deb

            ### 更新内容
            请查看 [Commit 历史](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) 获取详细更新内容。
          draft: false
          prerelease: false
          make_latest: true
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
